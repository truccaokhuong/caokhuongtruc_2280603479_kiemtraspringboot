<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Doctor Management</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="site-header">
    <div class="container header-row">
        <h1>Doctor Management</h1>
        <nav class="header-actions">
            <a class="btn" th:href="@{/}">Home</a>
            <a class="btn" th:href="@{/admin/doctors/create}">Create Doctor</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn danger" type="submit">Logout</button>
            </form>
        </nav>
    </div>
</header>

<main class="container">
    <p class="success" th:if="${successMessage}" th:text="${successMessage}"></p>

    <form class="search-row" method="get" th:action="@{/admin/doctors}">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="Search doctor by name">
        <button class="btn" type="submit">Search</button>
    </form>

    <table class="doctor-table">
        <thead>
        <tr>
            <th>Name</th>
            <th>Specialty</th>
            <th>Department</th>
            <th>Image</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="doctor : ${doctorPage.content}">
            <td th:text="${doctor.name}">Doctor Name</td>
            <td th:text="${doctor.specialty}">Specialty</td>
            <td th:text="${doctor.department.name}">Department</td>
            <td><a th:href="${doctor.image}" target="_blank">View</a></td>
            <td class="actions">
                <a class="btn" th:href="@{/admin/doctors/edit/{id}(id=${doctor.id})}">Edit</a>
                <form th:action="@{/admin/doctors/delete/{id}(id=${doctor.id})}" method="post"
                      onsubmit="return confirm('Delete this doctor?');">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn danger" type="submit">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <section class="pagination" th:if="${doctorPage.totalPages > 1}">
        <a class="btn" th:if="${!doctorPage.first}"
              th:href="@{/admin/doctors(page=${doctorPage.number - 1},keyword=${keyword})}">Previous</a>

        <span th:each="i : ${#numbers.sequence(0, doctorPage.totalPages - 1)}">
            <a class="btn"
               th:classappend="${i == doctorPage.number} ? ' active'"
               th:href="@{/admin/doctors(page=${i},keyword=${keyword})}"
               th:text="${i + 1}">1</a>
        </span>

        <a class="btn" th:if="${!doctorPage.last}"
           th:href="@{/admin/doctors(page=${doctorPage.number + 1},keyword=${keyword})}">Next</a>
    </section>
</main>
</body>
</html>
