<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="site-header">
    <div class="container header-row">
        <h1>My Appointments</h1>
        <nav class="header-actions">
            <a class="btn" th:href="@{/home}">Home</a>
        </nav>
    </div>
</header>

<main class="container">
    <p class="success" th:if="${successMessage}" th:text="${successMessage}"></p>

    <table class="doctor-table" th:if="${!#lists.isEmpty(appointments)}">
        <thead>
        <tr>
            <th>Doctor Name</th>
            <th>Appointment Date</th>
            <th>Department</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="appointment : ${appointments}">
            <td th:text="${appointment.doctor.name}"></td>
            <td th:text="${appointment.appointmentDate}"></td>
            <td th:text="${appointment.doctor.department.name}"></td>
        </tr>
        </tbody>
    </table>

    <p th:if="${#lists.isEmpty(appointments)}">No appointments yet.</p>
</main>
</body>
</html>
