<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Appointment - Home</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="site-header">
    <div class="container header-row">
        <h1>Clinic Appointment</h1>
        <nav class="header-actions">
            <a class="btn" th:href="@{/courses}">Courses</a>
            <a class="btn" th:href="@{/admin/doctors}">Admin Doctors</a>
            <a class="btn" th:href="@{/enroll/my-appointments}" sec:authorize="hasRole('PATIENT')">My Appointments</a>
            <a class="btn" th:href="@{/register}" sec:authorize="isAnonymous()">Register</a>
            <a class="btn" th:href="@{/login}" sec:authorize="isAnonymous()">Login</a>
            <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn danger" type="submit">Logout</button>
            </form>
        </nav>
    </div>
</header>

<main class="container">
    <section>
        <h2>Doctor Directory</h2>
        <p>Browse doctors by specialty and department.</p>
        <form class="search-row" method="get" th:action="@{/home}">
            <input type="text" name="keyword" th:value="${keyword}" placeholder="Search doctor by name">
            <button class="btn" type="submit">Search</button>
        </form>
    </section>

    <section class="doctor-grid">
        <article class="doctor-card" th:each="doctor : ${doctorPage.content}">
            <img th:src="${doctor.image}" alt="Doctor image" onerror="this.src='https://via.placeholder.com/300x220?text=Doctor'">
            <div class="card-content">
                <h3 th:text="${doctor.name}">Doctor Name</h3>
                <p><strong>Specialty:</strong> <span th:text="${doctor.specialty}">Specialty</span></p>
                <p><strong>Department:</strong> <span th:text="${doctor.department.name}">Department</span></p>
                <a class="btn" sec:authorize="hasRole('PATIENT')" th:href="@{/enroll/doctor/{id}(id=${doctor.id})}">Dat lich</a>
            </div>
        </article>
    </section>

    <section class="pagination" th:if="${doctorPage.totalPages > 1}">
        <a class="btn" th:if="${!doctorPage.first}" th:href="@{/home(page=${doctorPage.number - 1},keyword=${keyword})}">Previous</a>

        <span th:each="i : ${#numbers.sequence(0, doctorPage.totalPages - 1)}">
            <a class="btn"
               th:classappend="${i == doctorPage.number} ? ' active'"
               th:href="@{/home(page=${i},keyword=${keyword})}"
               th:text="${i + 1}">1</a>
        </span>

        <a class="btn" th:if="${!doctorPage.last}" th:href="@{/home(page=${doctorPage.number + 1},keyword=${keyword})}">Next</a>
    </section>
</main>
</body>
</html>
