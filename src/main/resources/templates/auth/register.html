<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="container auth-wrap">
    <form class="doctor-form" th:action="@{/register}" th:object="${registrationForm}" method="post">
        <h2>Patient Registration</h2>
        <p class="error" th:if="${registerError}" th:text="${registerError}"></p>

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <label for="username">Username</label>
        <input id="username" type="text" th:field="*{username}">
        <small class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></small>

        <label for="password">Password</label>
        <input id="password" type="password" th:field="*{password}">
        <small class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>

        <label for="email">Email</label>
        <input id="email" type="email" th:field="*{email}">
        <small class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>

        <button class="btn" type="submit">Register</button>
        <a th:href="@{/login}">Back to login</a>
    </form>
</main>
</body>
</html>
