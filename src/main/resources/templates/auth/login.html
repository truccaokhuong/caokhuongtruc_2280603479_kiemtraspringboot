<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="container auth-wrap">
    <form class="doctor-form" method="post" th:action="@{/login}">
        <h2>Login</h2>
        <p class="success" th:if="${successMessage}" th:text="${successMessage}"></p>
        <p class="error" th:if="${param.error}">Invalid username or password</p>
        <p class="success" th:if="${param.logout}">Logged out successfully</p>

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <label for="username">Username</label>
        <input id="username" type="text" name="username" required>

        <label for="password">Password</label>
        <input id="password" type="password" name="password" required>

        <button class="btn" type="submit">Sign in</button>
        <a class="btn btn-outline" th:href="@{/oauth2/authorization/google}">Login with Google</a>
        <a th:href="@{/register}">Create patient account</a>
    </form>
</main>
</body>
</html>
